[server.admin]
enabled = true

[server.jsonrpc]
enabled = true

[server.websocket]
enabled = true
ping_interval_secs = 30
pong_timeout_secs = 10

[server.sse]
enabled = true

[bootstrap]
nodes = [
    "/ip4/63.181.86.34/udp/4001/quic-v1/p2p/12D3KooWR5V4zmisVtVdGE6i8jfFwtgRNq5t8eDGxfckKuhXu7Eh",
