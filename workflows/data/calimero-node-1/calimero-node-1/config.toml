[discovery]
mdns = true
advertise_address = false
external_address = []

[discovery.rendezvous]
namespace = "/calimero/devnet/global"
discovery_rpm = 0.5
registrations_limit = 3

[discovery.rendezvous.discovery_interval]
secs = 15
nanos = 0

[discovery.relay]
registrations_limit = 3

[discovery.autonat]
max_candidates = 5

[discovery.autonat.probe_interval]
secs = 10
nanos = 0

[specialized_node]
invite_topic = "mero_specialized_node_invites"
accept_mock_tee = false

[sync]
timeout_ms = 30000
session_deadline_ms = 30000
interval_ms = 5000
frequency_ms = 10000

[datastore]
path = "data"

[blobstore]
path = "blobs"

[context]
migration_v2 = true

[context.config.signer.self.protocols]

[runtime.limits]

[dag_compaction]
enabled = true
min_deltas_before_compact = 10000
retain_recent_count = 1000
check_interval = 3600
